body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;gap:28px;padding:40px;}

<body>
<h1>Choose Your Party</h1>
<p class="subtitle">Facebook Page Profile Picture · 1080 × 1080 px</p>
<canvas id="pfp" width="1080" height="1080" style="width:360px;height:360px;"></canvas>
<p class="preview-note">Shown at display size — downloads at full 1080 × 1080 px</p>
<button class="btn" onclick="download()">⬇ Download PNG</button>

<script>
const canvas = document.getElementById('pfp');
const ctx = canvas.getContext('2d');
const W = 1080, H = 1080;

// Load fonts then draw
document.fonts.ready.then(() => draw());

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background: teal circle
  ctx.beginPath();
  ctx.arc(W/2, H/2, W/2, 0, Math.PI*2);
  ctx.fillStyle = '#2A8788';
  ctx.fill();

  // Subtle inner glow ring
  const grad = ctx.createRadialGradient(W/2, H/2-80, 100, W/2, H/2, W/2);
  grad.addColorStop(0, 'rgba(251,247,238,0.08)');
  grad.addColorStop(1, 'rgba(19,59,60,0.25)');
  ctx.beginPath();
  ctx.arc(W/2, H/2, W/2, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Map pin — drawn as path
  const px = W/2, py = 390, pr = 170;
  // Pin circle (head)
  ctx.beginPath();
  ctx.arc(px, py, pr, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(251,247,238,0.95)';
  ctx.fill();

  // Pin inner circle (hole)
  ctx.beginPath();
  ctx.arc(px, py, pr*0.42, 0, Math.PI*2);
  ctx.fillStyle = '#2A8788';
  ctx.fill();

  // Pin tail (teardrop point)
  ctx.beginPath();
  ctx.moveTo(px - pr*0.55, py + pr*0.72);
  ctx.quadraticCurveTo(px - pr*0.18, py + pr*1.85, px, py + pr*2.32);
  ctx.quadraticCurveTo(px + pr*0.18, py + pr*1.85, px + pr*0.55, py + pr*0.72);
  ctx.fillStyle = 'rgba(251,247,238,0.95)';
  ctx.fill();

  // Wordmark below pin
  ctx.fillStyle = 'rgba(251,247,238,0.92)';
  ctx.font = "400 72px 'Instrument Serif', Georgia, serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('Choose Your Party', W/2, 870);

  // Domain
  ctx.fillStyle = 'rgba(251,247,238,0.5)';
  ctx.font = "700 28px 'DM Sans', system-ui, sans-serif";
  ctx.letterSpacing = '3px';
  ctx.fillText('CHOOSEYOURPARTY.CLUB', W/2, 924);
}

function download() {
  const a = document.createElement('a');
  a.download = 'cyp-profile-pic.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
