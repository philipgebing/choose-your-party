*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:40px 20px;font-family:'DM Sans',sans-serif;}
h1{color:#fff;font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:22px;letter-spacing:-0.01em;}
.subtitle{color:rgba(255,255,255,0.35);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-top:-14px;}
.canvas-wrap{border-radius:10px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,0.7);}
canvas{display:block;width:100%;max-width:820px;height:auto;}
.note{color:rgba(255,255,255,0.28);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;text-align:center;max-width:500px;line-height:1.6;}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;padding:12px 32px;border-radius:999px;cursor:pointer;border:none;background:#FBD45A;color:#133B3C;transition:filter 0.15s;}
.btn:hover{filter:brightness(0.92);}
</style>
</head>
<body>
<h1>Choose Your Party</h1>
<p class="subtitle">Facebook Cover Photo · 1640 × 624 px</p>

<div class="canvas-wrap">
  <canvas id="cover" width="1640" height="624"></canvas>
</div>

<p class="note">Safe zone: important content is centred to avoid mobile cropping.<br>Downloads at 2× (1640 × 624 px) for sharp retina display.</p>
<button class="btn" onclick="dl()">⬇ Download PNG</button>

<script>
const cv = document.getElementById('cover');
const ctx = cv.getContext('2d');
const W = 1640, H = 624;

document.fonts.ready.then(draw);

function draw() {
  // ── Background: teal
  ctx.fillStyle = '#2A8788';
  ctx.fillRect(0, 0, W, H);

  // ── Subtle dot grid
  ctx.fillStyle = 'rgba(251,247,238,0.06)';
  for (let x = 30; x < W; x += 48) {
    for (let y = 24; y < H; y += 48) {
      ctx.beginPath();
      ctx.arc(x, y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Cream panel (right 40%)
  ctx.beginPath();
  ctx.moveTo(W * 0.62, 0);
  ctx.lineTo(W, 0);
  ctx.lineTo(W, H);
  ctx.lineTo(W * 0.56, H);
  ctx.closePath();
  ctx.fillStyle = '#F6F1E6';
  ctx.fill();

  // ── Map pin (left/centre of teal area)
  const px = W * 0.30, py = H * 0.40, pr = 96;
  // Pin head
  ctx.beginPath();
  ctx.arc(px, py, pr, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(251,247,238,0.18)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px, py, pr * 0.7, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(251,247,238,0.92)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px, py, pr * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = '#2A8788';
  ctx.fill();
  // Pin tail
  ctx.beginPath();
  ctx.moveTo(px - pr * 0.38, py + pr * 0.62);
  ctx.quadraticCurveTo(px - pr * 0.12, py + pr * 1.5, px, py + pr * 1.85);
  ctx.quadraticCurveTo(px + pr * 0.12, py + pr * 1.5, px + pr * 0.38, py + pr * 0.62);
  ctx.fillStyle = 'rgba(251,247,238,0.92)';
  ctx.fill();

  // ── Eyebrow (teal area, left of pin)
  ctx.fillStyle = 'rgba(251,247,238,0.45)';
  ctx.font = "400 22px 'JetBrains Mono', monospace";
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('// EVENT DISCOVERY', 80, 96);

  // ── Main headline on teal (centred in safe zone)
  ctx.fillStyle = '#FBF7EE';
  ctx.font = "400 112px 'Instrument Serif', Georgia, serif";
  ctx.textAlign = 'left';
  ctx.fillText('Find your', 80, 246);
  ctx.font = "italic 400 112px 'Instrument Serif', Georgia, serif";
  ctx.fillStyle = '#FBD45A';
  ctx.fillText('kind of night.', 80, 378);

  // ── Tagline
  ctx.fillStyle = 'rgba(251,247,238,0.5)';
  ctx.font = "400 26px 'DM Sans', sans-serif";
  ctx.textAlign = 'left';
  ctx.fillText('Your group chat is not a search engine. We are.', 80, H - 52);

  // ── Right cream panel: wordmark + domain
  const rx = W * 0.785;
  ctx.fillStyle = '#133B3C';
  ctx.font = "400 52px 'Instrument Serif', Georgia, serif";
  ctx.textAlign = 'center';
  ctx.fillText('Choose Your', rx, H * 0.42);
  ctx.font = "italic 400 52px 'Instrument Serif', Georgia, serif";
  ctx.fillStyle = '#2A8788';
  ctx.fillText('Party', rx, H * 0.42 + 60);

  ctx.fillStyle = 'rgba(19,59,60,0.4)';
  ctx.font = "400 20px 'JetBrains Mono', monospace";
  ctx.fillText('chooseyourparty.club', rx, H * 0.42 + 108);

  // ── Butter pill CTA on cream
  const pillW = 280, pillH = 56, pillX = rx - pillW/2, pillY = H * 0.72;
  ctx.beginPath();
  ctx.roundRect(pillX, pillY, pillW, pillH, 999);
  ctx.fillStyle = '#FBD45A';
  ctx.fill();
  ctx.fillStyle = '#133B3C';
  ctx.font = "700 20px 'DM Sans', sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText('FIND A PARTY TONIGHT →', rx, pillY + 36);
}

function dl() {
  const a = document.createElement('a');
  a.download = 'cyp-facebook-cover.png';
  a.href = cv.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
